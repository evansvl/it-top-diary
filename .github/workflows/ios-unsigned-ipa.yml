name: iOS unsigned IPA (Sideloadly/AltStore)

# Собирает НЕПОДПИСАННЫЙ .ipa с device-бинарником (arm64) на бесплатном
# macOS-раннере. Такой .ipa нельзя поставить напрямую, но его пере-подписывает
# Sideloadly/AltStore вашим бесплатным Apple ID (срок жизни подписи — 7 дней).
# Запуск вручную: вкладка Actions → этот workflow → Run workflow.

on:
  workflow_dispatch:

jobs:
  build:
    # macos-15 несёт Xcode 16.x (RN 0.85 требует >= 16.1).
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select newest Xcode
        # Некоторые SwiftPM-зависимости требуют Swift tools 6.2 (Xcode 26),
        # поэтому берём самый новый установленный Xcode, а не 16.x.
        run: |
          echo "Available Xcodes:"; ls /Applications | grep -E '^Xcode'
          LATEST=$(ls /Applications | grep -E '^Xcode_[0-9]' | sort -V | tail -1)
          echo "Using $LATEST"
          sudo xcode-select -s "/Applications/$LATEST/Contents/Developer"
          xcodebuild -version
          swift --version

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install JS deps
        run: npm ci --legacy-peer-deps

      - name: Expo prebuild (iOS native project)
        run: npx expo prebuild -p ios --no-install
        env:
          CI: 1

      - name: Install CocoaPods
        working-directory: ios
        run: pod install --repo-update

      - name: Resolve workspace and scheme
        id: xc
        run: |
          WS=$(ls ios | grep '\.xcworkspace$' | head -1)
          # Схема приложения = имя .xcodeproj (а не первая из workspace —
          # там первым идёт под-схема CocoaPods вроде EXConstants).
          SCHEME=$(ls ios | grep '\.xcodeproj$' | head -1 | sed 's/\.xcodeproj$//')
          echo "workspace=$WS" >> "$GITHUB_OUTPUT"
          echo "scheme=$SCHEME" >> "$GITHUB_OUTPUT"
          echo "Workspace: $WS  Scheme: $SCHEME"

      - name: Build (device, no code signing)
        run: |
          set -eo pipefail
          xcodebuild \
            -workspace "ios/${{ steps.xc.outputs.workspace }}" \
            -scheme "${{ steps.xc.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath "$RUNNER_TEMP/dd" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGN_ENTITLEMENTS="" \
            build

      - name: Package unsigned .ipa
        run: |
          set -eo pipefail
          PRODUCTS="$RUNNER_TEMP/dd/Build/Products/Release-iphoneos"
          echo "--- products ---"; ls -la "$PRODUCTS" || true
          APP=$(find "$PRODUCTS" -maxdepth 1 -type d -name '*.app' | head -1 || true)
          if [ -z "$APP" ]; then
            echo "::error::No .app in $PRODUCTS"; exit 1
          fi
          echo "Using: $APP"
          mkdir -p "$RUNNER_TEMP/Payload"
          cp -R "$APP" "$RUNNER_TEMP/Payload/"
          (cd "$RUNNER_TEMP" && zip -qr ittop-unsigned.ipa Payload)
          ls -lh "$RUNNER_TEMP/ittop-unsigned.ipa"

      - name: Upload .ipa artifact
        uses: actions/upload-artifact@v4
        with:
          name: ittop-unsigned-ipa
          path: ${{ runner.temp }}/ittop-unsigned.ipa
          if-no-files-found: error
